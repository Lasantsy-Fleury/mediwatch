# ─────────────────────────────────────────────────────────────
# Pipeline CD — Déploiement Continu
# Déclenché uniquement sur push vers main (après merge PR)
# ─────────────────────────────────────────────────────────────
name: CD — Build & Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"   # Déclenché aussi sur les tags de version ex: v1.0.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mediwatch-backend

jobs:

  # ─────────────────────────────────────────
  # Job 1 : Build et push image Docker
  # ─────────────────────────────────────────
  build-and-push:
    name:  Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Génération des artefacts ML pour le build
        run: |
          pip install scikit-learn pandas numpy
          python scripts/generate_data.py --n-patients 50 --n-notes 200
          python scripts/train_text_model.py

      - name: Build et push image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du déploiement
        run: |
          echo "##  Image Docker publiée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry** : ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags** :" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # Job 2 : Notification de déploiement
  # ─────────────────────────────────────────
  notify:
    name:  Notification
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Résumé du pipeline
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo " Pipeline CD réussi — Image disponible sur GHCR"
          else
            echo " Pipeline CD échoué — Vérifier les logs"
          fi