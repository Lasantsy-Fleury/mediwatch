# ─────────────────────────────────────────────────────────────
# Pipeline CI — Intégration Continue
# Déclenché à chaque push et pull request sur main et develop
# ─────────────────────────────────────────────────────────────
name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # Job 1 : Lint et vérification du code
  # ─────────────────────────────────────────
  lint:
    name:  Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Installation des outils de lint
        run: |
          pip install flake8 black isort mypy

      - name: Vérification formatage Black
        run: |
          black --check --diff backend/ scripts/
        continue-on-error: true

      - name: Vérification imports avec isort
        run: |
          isort --check-only --diff backend/ scripts/
        continue-on-error: true

      - name: Lint avec flake8
        run: |
          flake8 backend/ scripts/ \
            --max-line-length=100 \
            --exclude=__pycache__,.git \
            --ignore=E501,W503,E203
        continue-on-error: true

  # ─────────────────────────────────────────
  # Job 2 : Tests unitaires
  # ─────────────────────────────────────────
  test:
    name:  Tests unitaires
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          pip install fastapi uvicorn pydantic python-multipart
          pip install scikit-learn pandas numpy pillow
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Génération des données synthétiques
        run: |
          python scripts/generate_data.py \
            --n-patients 50 \
            --n-notes 100 \
            --output-dir data/synthetic

      - name: Entraînement modèle NLP (pour les tests)
        run: |
          python scripts/train_text_model.py \
            --data-path data/synthetic/consultation_notes.csv \
            --output-dir ml_models/text

      - name: Lancement des tests avec coverage
        run: |
          cd backend
          pytest ../tests/ \
            --cov=. \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage vers Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Vérification seuil de coverage (60% minimum)
        run: |
          cd backend
          pytest ../tests/ \
            --cov=. \
            --cov-fail-under=60 \
            -q

  # ─────────────────────────────────────────
  # Job 3 : Vérification du build Docker
  # ─────────────────────────────────────────
  docker-build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Génération données + modèle pour le build
        run: |
          pip install scikit-learn pandas numpy
          python scripts/generate_data.py --n-patients 20 --n-notes 50
          python scripts/train_text_model.py

      - name: Build image Docker (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mediwatch-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test de santé du conteneur
        run: |
          docker run -d \
            --name mediwatch-test \
            -p 8000:8000 \
            mediwatch-backend:ci-test

          # Attente démarrage (max 30s)
          for i in $(seq 1 10); do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo " Conteneur démarré avec succès"
              break
            fi
            echo "Attente... ($i/10)"
            sleep 3
          done

          docker stop mediwatch-test
          docker rm mediwatch-test